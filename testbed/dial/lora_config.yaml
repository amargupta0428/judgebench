# ai-toolkit config — rhode style LoRA on FLUX.1-dev (community-standard recipe)
job: extension
config:
  name: rhode_lora
  process:
    - type: sd_trainer
      training_folder: output
      device: cuda:0
      trigger_word: rhodestyle
      network:
        type: lora
        linear: 16
        linear_alpha: 16
      save:
        dtype: float16
        save_every: 500
        max_step_saves_to_keep: 6
      datasets:
        - folder_path: dataset/rhode
          caption_ext: txt
          caption_dropout_rate: 0.05
          resolution: [1024]
      train:
        batch_size: 1
        steps: 3000
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: flowmatch
        optimizer: adamw8bit
        lr: 1e-4
        dtype: bf16
      model:
        name_or_path: black-forest-labs/FLUX.1-dev
        is_flux: true
        quantize: true
      sample:
        sampler: flowmatch
        sample_every: 250
        width: 1024
        height: 1024
        prompts:
          - "macro product photograph of a lip balm tube on a neutral background"
          - "portrait of a model with dewy minimal makeup, natural light"
          - "flat lay of skincare products on a stone surface"
          - "lifestyle photo, woman at a bathroom mirror"
        seed: 42
        guidance_scale: 3.5
        sample_steps: 28
